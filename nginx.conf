server {
    # Cloud Run routes traffic to the container on port 8080 by default.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text-based assets.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/geo+json;

    # Hashed build assets are immutable; cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: serve index.html for any unmatched route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html should always be revalidated so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
